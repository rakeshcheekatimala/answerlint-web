name: Release notes

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: read

jobs:
  update-release-draft:
    name: Update release draft
    runs-on: ubuntu-latest
    steps:
      - name: Draft release notes
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
